<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySGAME V5 - FINAL FIXED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Share Tech Mono', monospace; background: #050505; color: #00ffcc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #login-page { background: #000; border: 1px solid #00ffcc; padding: 30px; text-align: center; width: 95%; max-width: 400px; box-shadow: 0 0 15px #00ffcc33; }
        .input-box { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #00ffcc; text-align: center; margin-bottom: 15px; font-family: inherit; font-size: 1.2rem; }
        .btn { width: 100%; padding: 12px; background: #00ffcc; color: #000; font-weight: bold; border: none; cursor: pointer; font-family: inherit; }
        #main-page { display: none; width: 100%; max-width: 500px; padding: 10px; }
        .box { border: 1px solid #00ffcc; padding: 15px; margin-bottom: 10px; background: rgba(0,255,204,0.05); text-align: center; }
        .timer { font-size: 2.5rem; color: #ffcc00; font-weight: bold; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; border: 1px solid #333; font-size: 0.8rem; background: #000; }
        th, td { border: 1px solid #222; padding: 10px; text-align: center; }
        th { background: #0a1919; color: #ffcc00; }
        .badge { padding: 4px 8px; font-weight: bold; color: #000; border-radius: 2px; text-transform: uppercase; }
        .win { background: #0f0; } .lose { background: #f33; color: #fff; } .wait { background: #ffcc00; animation: bl 1s infinite; }
        @keyframes bl { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="login-page">
        <h1 style="margin-bottom:10px;">MySGAME V5</h1>
        <p style="color:#666; font-size:0.7rem; margin-bottom:20px;">STABLE BYPASS MODE</p>
        <input type="password" id="pass" class="input-box" placeholder="ACCESS KEY">
        <button class="btn" onclick="start()">ACTIVATE SYSTEM</button>
    </div>

    <div id="main-page">
        <div class="box">
            <div id="status" style="color:#f33; font-size:0.8rem;">INITIALIZING...</div>
            <div id="timer" class="timer">--s</div>
            <div style="font-size:0.7rem; color:#444;">WINGO 1M - REALTIME</div>
        </div>
        <table id="myTable">
            <thead>
                <tr><th>PERIOD</th><th>PRED</th><th>RESULT</th><th>STATUS</th></tr>
            </thead>
            <tbody id="logs"></tbody>
        </table>
    </div>

<script>
    let lastId = null; let history = []; let w=0, l=0;

    async function updateData() {
        // GUNA PROXY BARU YANG LAGI "LEPAS" UNTUK SAFARI/CHROME
        const target = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
        const proxy = "https://corsproxy.io/?" + encodeURIComponent(target);

        try {
            const res = await fetch(proxy + "&t=" + Date.now());
            const data = await res.json();
            const latest = data.data.list[0];
            const currentIssue = String(latest.issue);

            document.getElementById("status").innerText = "● SERVER ONLINE";
            document.getElementById("status").style.color = "#00ffcc";

            if (currentIssue !== lastId) {
                // Check Win/Lose
                history.forEach(row => {
                    if (row.id === currentIssue && row.status === "WAIT") {
                        const resSize = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
                        row.res = resSize + " (" + latest.number + ")";
                        if (row.pred === resSize) { row.status = "WIN"; } 
                        else { row.status = "LOSE"; }
                    }
                });

                // Generate Next Prediction
                const nextId = (BigInt(currentIssue) + 1n).toString();
                const aiPred = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
                
                history.unshift({ id: nextId, pred: aiPred, res: "...", status: "WAIT" });
                if (history.length > 7) history.pop();
                lastId = currentIssue;
                render();
            }
        } catch (e) {
            document.getElementById("status").innerText = "● RECONNECTING...";
            document.getElementById("status").style.color = "#f33";
        }
    }

    function render() {
        document.getElementById("logs").innerHTML = history.map(h => `
            <tr>
                <td>${h.id.slice(-4)}</td>
                <td style="color:${h.pred === 'BIG' ? '#ffcc00' : '#00ffcc'}; font-weight:bold;">${h.pred}</td>
                <td>${h.res}</td>
                <td><span class="badge ${h.status.toLowerCase()}">${h.status}</span></td>
            </tr>
        `).join('');
    }

    function start() {
        if (document.getElementById("pass").value === "Wan00") {
            document.getElementById("login-page").style.display = "none";
            document.getElementById("main-page").style.display = "block";
            setInterval(() => {
                const sec = new Date().getSeconds();
                document.getElementById("timer").innerText = (60 - sec) + "s";
                if (sec % 3 === 0) updateData();
            }, 1000);
            updateData();
        } else {
            alert("KEY SALAH!");
        }
    }
</script>
</body>
</html>
